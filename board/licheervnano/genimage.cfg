image boot.vfat {
    vfat {
        files = {
            "fip.bin",
            "Image",
            "sg2002-licheerv-nano-b.dtb",
            "sg2002-licheerv-nano-we.dtb"
        }
        file extlinux/extlinux.conf {
            image = "extlinux.conf"
        }
    }
    size = 64M
}

image sdcard.img {
    hdimage {
        partition-table-type = "mbr"
    }

    partition boot {
        partition-type = 0x0C
        image = "boot.vfat"
    }

    partition rootfs {
        partition-type = 0x83
        image = "rootfs.ext4"
    }
}
